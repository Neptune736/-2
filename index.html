<!DOCTYPE html>
<html>
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.2/dist/mindar-image-aframe.prod.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/donmccurdy/aframe-extras@v6.1.1/dist/aframe-extras.min.js"></script>
    
    <style>
      html, body { width: 100%; height: 100%; margin: 0; padding: 0; overflow: hidden; background-color: transparent; }
      a-scene { width: 100%; height: 100%; position: absolute; z-index: 1; }
      
      /* 密碼畫面底圖 */
      #lock-screen {
        position: absolute; z-index: 999; top: 0; left: 0; width: 100%; height: 100%;
        background-image: url('./bg.jpg'); background-size: cover; background-position: center; background-repeat: no-repeat; 
        display: flex; flex-direction: column; justify-content: center; align-items: center; color: white; font-family: sans-serif;
      }
      
      #lock-screen h2 {
        text-shadow: 2px 2px 8px rgba(0, 0, 0, 0.8); text-align: center; padding: 0 20px; 
        margin-bottom: 4vw; /* 讓文字間距也跟著螢幕大小縮放 */
        font-size: 6vw;     /* 👈 讓標題文字大小也能自適應手機螢幕 */
      }
      
      /* 🛠️ 核心修改 1：自適應輸入框圖片 🛠️ */
      input { 
        width: 65vw;           /* 👈 寬度佔手機螢幕寬度的 85% */
        height: 35vw;          /* 👈 高度隨著螢幕寬度等比例縮放（請依你設計的 PNG 長寬比微調，例如：15vw） */
        font-size: 4.5vw;      /* 👈 輸入進去的字體大小也會自動縮放 */
        text-align: center;
        background-image: url('./input-bg.png'); 
        background-size: 100% 100%;
        background-position: center;
        background-repeat: no-repeat;
        background-color: transparent; 
        border: none;          
        outline: none;         
        color: #ffffff;        
        padding: 0 4vw;       
        box-sizing: border-box;
      }
      
      /* 🛠️ 核心修改 2：自適應按鈕圖片 🛠️ */
      button { 
        width: 65vw;           /* 👈 寬度佔手機螢幕寬度的 65% */
        height: 34vw;          /* 👈 高度隨著螢幕寬度等比例縮放（請依你設計的 PNG 長寬比微調，例如：14vw） */
        font-size: 0;          
        background-image: url('./button-bg.png'); 
        background-size: 100% 100%;
        background-position: center;
        background-repeat: no-repeat;
        background-color: transparent; 
        border: none;
        cursor: pointer;
        margin-top: 4vw;       /* 間距自適應 */
      }
      
      button:active {
        transform: scale(0.95);
      }
    </style>
  </head>
  
  <body>

    <div id="lock-screen">
      <h2>✨ 請輸入聽見魔法的咒語 ✨</h2>
      <input type="text" id="magic-word" placeholder="請輸入密碼...">
      <button onclick="unlockAR()">施展魔法</button>
    </div>

    <a-scene mindar-image="imageTargetSrc: ./targets.mind; uiLoading: no; uiError: no; filterMinCF: 0.00001; filterBeta: 0.1;" color-space="sRGB" renderer="colorManagement: true, physicallyCorrectLights" vr-mode-ui="enabled: false" device-orientation-permission-ui="enabled: false">
      <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

      <a-entity mindar-image-target="targetIndex: 0">
        <a-gltf-model id="my-avatar" rotation="0 0 0" position="0 0 0.1" scale="1.5 1.5 1.5" src="./avatar.glb" animation-mixer visible="false"></a-gltf-model>
        <a-entity id="my-sound" sound="src: ./card-music.mp3"></a-entity>
      </a-entity>
    </a-scene>

    <script>
      function unlockAR() {
        var answer = document.getElementById("magic-word").value;
        
        if (answer === "1234") {
          document.getElementById("lock-screen").style.display = "none";
          
          var audio = new Audio('./card-music.mp3');
          audio.load();

          var cardTarget = document.querySelector('[mindar-image-target]');
          var avatarModel = document.getElementById('my-avatar');
          var delayTimer = null; 

          cardTarget.addEventListener("targetFound", function() {
            avatarModel.setAttribute('visible', 'false');
            
            delayTimer = setTimeout(function() {
              avatarModel.setAttribute('visible', 'true'); 
              audio.currentTime = 0; 
              audio.play();
            }, 1000); 
          });

          cardTarget.addEventListener("targetLost", function() {
            clearTimeout(delayTimer);
            avatarModel.setAttribute('visible', 'false');
            audio.pause();
          });

        } else {
          alert("❌ 咒語錯誤！再試一次！");
        }
      }
    </script>
  </body>
</html>
